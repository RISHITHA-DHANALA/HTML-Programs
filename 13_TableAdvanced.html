<!DOCTYPE html>
<html>
<head>
    <title>Advanced Table</title>
</head>
<body>

    <h2>Advanced Table Example</h2>

    <table border="1">
        <tr>
            <th rowspan="2">Name</th>
            <th colspan="2">Marks</th>
        </tr>
        <tr>
            <th>Math</th>
            <th>Science</th>
        </tr>
        <tr>
            <td>Dora</td>
            <td>90</td>
            <td>95</td>
        </tr>
    </table>

</body>
</html>
