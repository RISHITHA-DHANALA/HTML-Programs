<!DOCTYPE html>
<html>
<head>
    <title>Audio and Video</title>
</head>
<body>

    <h2>Audio Example</h2>
    <audio controls>
        <source src="sample.mp3" type="audio/mpeg">
    </audio>

    <h2>Video Example</h2>
    <video width="300" controls>
        <source src="sample.mp4" type="video/mp4">
    </video>

</body>
</html>
