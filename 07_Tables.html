<!DOCTYPE html>
<html>
<head>
    <title>HTML Tables</title>
</head>
<body>

    <h2>Student Table</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Roll</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Dora</td>
            <td>101</td>
            <td>95</td>
        </tr>
        <tr>
            <td>Alex</td>
            <td>102</td>
            <td>90</td>
        </tr>
    </table>

</body>
</html>
